<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NovaCore AI Studio - Criação de Conta de Desenvolvedor.">
    <title>Cadastro | NovaCore AI Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/glassmorphism.css">
    <style>
        /* Estilos isolados para a interface de registro */
        .auth-viewport {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-hero);
            position: relative;
            padding: var(--space-3);
            overflow: hidden;
        }
        .auth-container {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: var(--z-sticky);
        }
        .auth-brand {
            text-align: center;
            margin-bottom: var(--space-4);
        }
        .auth-brand a {
            font-family: var(--font-display);
            font-weight: var(--weight-display);
            font-size: var(--font-size-xxl);
            color: var(--color-white-pure);
            letter-spacing: -0.03em;
        }
        .auth-card {
            padding: var(--space-5) var(--space-4);
        }
        .auth-header {
            margin-bottom: var(--space-4);
            text-align: center;
        }
        .auth-header h2 {
            font-size: var(--font-size-xl);
            color: var(--color-white-pure);
            margin-bottom: var(--space-1);
        }
        .auth-header p {
            font-size: var(--font-size-sm);
            color: var(--color-grey);
        }
        .auth-footer {
            margin-top: var(--space-4);
            text-align: center;
            font-size: var(--font-size-sm);
            color: var(--color-grey);
        }
        .auth-footer a {
            font-weight: var(--weight-semibold);
        }
        .terms-label {
            font-size: var(--font-size-xs);
            color: var(--color-grey);
            line-height: var(--lh-base);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="auth-viewport">
        <div class="blur-blob blur-blob-blue" style="top: -15%; right: -5%;"></div>
        <div class="blur-blob blur-blob-neon" style="bottom: -10%; left: -5%;"></div>

        <div class="auth-container animate-scale-up">
            <div class="auth-brand">
                <a href="index.html" class="neon-glow-text">NOVA<span style="color: var(--color-neon);">CORE</span></a>
            </div>

            <div class="card glass-panel-neon auth-card">
                <div class="auth-header">
                    <h2>Crie sua conta Sandbox</h2>
                    <p>Acesso instantâneo a ferramentas de IA e métricas</p>
                </div>

                <form id="register-form" novalidate>
                    <div class="form-group">
                        <label for="name" class="form-label">Nome Completo</label>
                        <input type="text" id="name" class="form-control glass-input-premium" placeholder="Seu nome" required autocomplete="name">
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Endereço de E-mail</label>
                        <input type="email" id="email" class="form-control glass-input-premium" placeholder="seu@email.com" required autocomplete="email">
                    </div>

                    <div class="form-group" style="margin-bottom: var(--space-3);">
                        <label for="password" class="form-label">Senha de Acesso</label>
                        <input type="password" id="password" class="form-control glass-input-premium" placeholder="Mínimo de 6 caracteres" required autocomplete="new-password">
                    </div>

                    <div style="margin-bottom: var(--space-4);">
                        <label class="switch-control">
                            <input type="checkbox" id="terms" class="switch-input" required>
                            <span class="switch-slider"></span>
                            <span class="terms-label">Aceito os <a href="#" class="btn-text" style="padding: 0; color: var(--color-neon);">Termos de Serviço</a> e <a href="#" class="btn-text" style="padding: 0; color: var(--color-neon);">Políticas</a></span>
                        </label>
                    </div>

                    <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%;">
                        Concluir Cadastro
                    </button>
                </form>

                <div class="auth-footer">
                    Já possui acesso? <a href="login.html" class="btn-text" style="color: var(--color-neon);">Fazer Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/core.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('register-form');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const termsCheckbox = document.getElementById('terms');
            const submitBtn = document.getElementById('submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const name = nameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // Validações de entrada estritas
                if (name.length < 2) {
                    window.NovaCoreUI.showToast('Por favor, digite seu nome completo.', 'error');
                    nameInput.focus();
                    return;
                }

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    window.NovaCoreUI.showToast('Insira um endereço de e-mail estruturalmente válido.', 'error');
                    emailInput.focus();
                    return;
                }

                if (password.length < 6) {
                    window.NovaCoreUI.showToast('A senha de segurança deve conter no mínimo 6 dígitos.', 'error');
                    passwordInput.focus();
                    return;
                }

                if (!termsCheckbox.checked) {
                    window.NovaCoreUI.showToast('É mandatório aceitar os termos de serviço regulamentares.', 'error');
                    return;
                }

                // Início do estado de processamento assíncrono
                submitBtn.classList.add('is-loading');
                submitBtn.disabled = true;

                try {
                    // Executa a tentativa de criação de registro no microssistema
                    await window.NovaCoreAuth.register(name, email, password);
                    window.NovaCoreUI.showToast('Conta criada! Redirecionando para login...', 'success');
                    
                    setTimeout(() => {
                        window.location.replace('login.html');
                    }, 1500);

                } catch (error) {
                    window.NovaCoreUI.showToast(error.message, 'error');
                    submitBtn.classList.remove('is-loading');
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
