<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NovaCore AI Studio</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Links Corrigidos para a Raiz -->
    <link rel="stylesheet" href="./variables.css">
    <link rel="stylesheet" href="./reset.css">
    <link rel="stylesheet" href="./components.css">
    <link rel="stylesheet" href="./layout.css">
    <link rel="stylesheet" href="./animations.css">
    <link rel="stylesheet" href="./glassmorphism.css">
    <style>
        .stat-grid-three {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-3);
            margin-bottom: var(--space-4);
        }
        .stat-display-value {
            font-size: var(--font-size-xxl);
            font-weight: var(--weight-display);
            color: var(--color-white-pure);
            line-height: 1.2;
            margin: var(--space-1) 0;
        }
        .api-key-container {
            display: flex;
            gap: var(--space-2);
            align-items: center;
            background-color: var(--color-bg);
            padding: var(--space-2);
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border);
            font-family: var(--font-code);
            margin-top: var(--space-2);
        }
        .activity-list-wrapper {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            margin-top: var(--space-2);
        }
        .activity-row-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-2);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        @media (max-width: 768px) {
            .stat-grid-three { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="app-wrapper animate-fade-in">
        <!-- SIDEBAR -->
        <aside class="app-sidebar" id="sidebar-menu">
            <div>
                <div class="sidebar-header">
                    <a href="index.html" class="neon-glow-text" style="font-family: var(--font-display); font-weight: var(--weight-bold); font-size: var(--font-size-lg); color: var(--color-white-pure);">
                        NOVA<span style="color: var(--color-neon);">CORE</span>
                    </a>
                </div>
                <nav class="sidebar-nav">
                    <a href="dashboard.html" class="sidebar-link is-active">Dashboard</a>
                </nav>
            </div>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-danger" style="width: 100%;">Sair do Sistema</button>
            </div>
        </aside>

        <!-- HEADER -->
        <header class="app-header">
            <div class="header-left">
                <h3 style="font-size: var(--font-size-md); font-weight: var(--weight-semibold);">Ambiente de Console</h3>
            </div>
            <div class="header-right">
                <button class="btn btn-secondary" id="user-display-name">Carregando...</button>
            </div>
        </header>

        <!-- MAIN -->
        <main class="app-main animate-fade-in-up">
            <div class="stat-grid-three">
                <div class="card glass-panel-neon">
                    <span class="form-label">Requisições Consumidas</span>
                    <div class="stat-display-value" id="stat-requests">...</div>
                </div>
                <div class="card glass-panel-neon">
                    <span class="form-label">Faturamento Operacional</span>
                    <div class="stat-display-value" id="stat-revenue">...</div>
                </div>
                <div class="card glass-panel-neon">
                    <span class="form-label">Média de Latência</span>
                    <div class="stat-display-value">14.2 ms</div>
                </div>
            </div>

            <div class="dashboard-layout-grid">
                <div class="card glass-panel">
                    <h4 style="color: var(--color-white-pure);">Tokens de Acesso à API</h4>
                    <div class="api-key-container">
                        <span id="api-key-masked">nc_live_••••••••••••••••••••••••</span>
                    </div>
                </div>
                <div class="card glass-panel">
                    <h4 style="color: var(--color-white-pure);">Logs Auditores</h4>
                    <div class="activity-list-wrapper" id="logs-container"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts Corrigidos para a Raiz -->
    <script src="./core.js"></script>
    <script src="./api.js"></script>
    <script src="./auth.js"></script>
    <script src="./components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = window.NovaCoreAuth.getCurrentSession();
            if (!session) return;
            
            document.getElementById('user-display-name').textContent = session.user.name;
            const mockData = window.NovaCoreAPI.FallbackMockData;
            document.getElementById('stat-requests').textContent = window.NovaCoreUtils.formatCompactNumber(mockData.stats.sessions);
            document.getElementById('stat-revenue').textContent = window.NovaCoreUtils.formatCurrency(mockData.stats.revenue);

            const logsContainer = document.getElementById('logs-container');
            if (logsContainer) {
                logsContainer.innerHTML = mockData.activities.map(act => `
                    <div class="activity-row-item">
                        <div>
                            <h5 style="font-size: var(--font-size-sm); color: var(--color-white);">${act.action}</h5>
                            <small style="color: var(--color-grey-soft);">${act.date}</small>
                        </div>
                    </div>
                `).join('');
            }

            document.getElementById('logout-btn').addEventListener('click', () => window.NovaCoreAuth.logout());
        });
    </script>
</body>
</html>
