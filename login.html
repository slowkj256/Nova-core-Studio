<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NovaCore AI Studio</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Links Corrigidos para a Raiz -->
    <link rel="stylesheet" href="./variables.css">
    <link rel="stylesheet" href="./reset.css">
    <link rel="stylesheet" href="./components.css">
    <link rel="stylesheet" href="./layout.css">
    <link rel="stylesheet" href="./animations.css">
    <link rel="stylesheet" href="./glassmorphism.css">
    <style>
        .auth-viewport {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-hero);
            position: relative;
            padding: var(--space-3);
            overflow: hidden;
        }
        .auth-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: var(--z-sticky);
        }
        .auth-brand {
            text-align: center;
            margin-bottom: var(--space-4);
        }
        .auth-brand a {
            font-family: var(--font-display);
            font-weight: var(--weight-display);
            font-size: var(--font-size-xxl);
            color: var(--color-white-pure);
        }
        .auth-card {
            padding: var(--space-5) var(--space-4);
        }
        .auth-header {
            margin-bottom: var(--space-4);
            text-align: center;
        }
        .auth-header h2 {
            font-size: var(--font-size-xl);
            color: var(--color-white-pure);
        }
        .auth-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-4);
        }
        .auth-footer {
            margin-top: var(--space-4);
            text-align: center;
            font-size: var(--font-size-sm);
            color: var(--color-grey);
        }
    </style>
</head>
<body>

    <div class="auth-viewport">
        <div class="auth-container animate-scale-up">
            <div class="auth-brand">
                <a href="index.html" class="neon-glow-text">NOVA<span style="color: var(--color-neon);">CORE</span></a>
            </div>

            <div class="card glass-panel-neon auth-card">
                <div class="auth-header">
                    <h2>Bem-vindo de volta</h2>
                    <p>Insira suas credenciais para acessar o estúdio</p>
                </div>

                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label for="email" class="form-label">Endereço de E-mail</label>
                        <input type="email" id="email" class="form-control glass-input-premium" placeholder="seu@email.com" required>
                    </div>

                    <div class="form-group" style="margin-bottom: var(--space-2);">
                        <label for="password" class="form-label">Sua Senha</label>
                        <input type="password" id="password" class="form-control glass-input-premium" placeholder="••••••••" required>
                    </div>

                    <div class="auth-options">
                        <label class="switch-control" style="font-size: var(--font-size-sm); color: var(--color-grey);">
                            <input type="checkbox" id="remember-me" class="switch-input">
                            <span class="switch-slider"></span>
                            Lembrar acesso
                        </label>
                        <a href="#" style="font-size: var(--font-size-sm); color: var(--color-grey);">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%;">
                        Entrar no Painel
                    </button>
                </form>

                <div class="auth-footer">
                    Não possui uma conta? <a href="register.html" class="btn-text" style="color: var(--color-neon);">Cadastre-se</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts Corrigidos para a Raiz -->
    <script src="./core.js"></script>
    <script src="./api.js"></script>
    <script src="./auth.js"></script>
    <script src="./components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                try {
                    await window.NovaCoreAuth.login(email, password, true);
                    window.NovaCoreUI.showToast('Autenticado com sucesso!', 'success');
                    setTimeout(() => window.location.replace('dashboard.html'), 800);
                } catch (error) {
                    window.NovaCoreUI.showToast(error.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
